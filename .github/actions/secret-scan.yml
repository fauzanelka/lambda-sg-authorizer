# =============================================================================
# Secret Scan — Gitleaks
# =============================================================================
# Scans the full git commit history and all files in the PR for hardcoded
# secrets, tokens, API keys, and passwords using Gitleaks.
#
# Triggers: every pull request (any source branch → any target branch)
#
# Setup:
#   1. Copy this file to .github/workflows/secret-scan.yml in your repository
#   2. No additional secrets or configuration required for public repos
#   3. For private repos using Gitleaks commercial features, add
#      GITLEAKS_LICENSE to your repository secrets
#
# Results:
#   - Job fails if any secret is detected → PR cannot be merged
#   - Findings are annotated directly on the PR diff
#   - Full JSON report is uploaded as a downloadable workflow artifact
# =============================================================================

name: Secret Scan

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write   # allows Gitleaks to annotate the PR

jobs:
  gitleaks:
    name: Gitleaks — Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # required: Gitleaks walks the full commit log

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # uncomment for commercial use

      - name: Upload JSON report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: gitleaks-report-${{ github.event.pull_request.number }}
          path: results.sarif
          retention-days: 30
